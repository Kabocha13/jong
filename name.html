<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Q-Jong Digital Owner's Card</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Montserrat:wght@100;200;300;400&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0c;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
    font-family: 'Montserrat', sans-serif;
  }

  .scene {
    perspective: 1200px;
    perspective-origin: center center;
  }

  /* ===== CARD ===== */
  .card {
    width: 380px;
    height: 240px;
    position: relative;
    border-radius: 16px;
    transform-style: preserve-3d;
    cursor: pointer;
    animation: cardEntrance 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    transform: rotateX(20deg) rotateY(-15deg) translateY(40px);
    opacity: 0;
  }

  @keyframes cardEntrance {
    0%   { transform: rotateX(20deg) rotateY(-15deg) translateY(40px) scale(0.92); opacity: 0; }
    60%  { opacity: 1; }
    100% { transform: rotateX(8deg) rotateY(-8deg) translateY(0) scale(1); opacity: 1; }
  }

  /* ===== BASE LAYER: Champagne Gold ===== */
  .card-base {
    position: absolute;
    inset: 0;
    border-radius: 16px;
    background:
      linear-gradient(135deg,
        #f5e6c0 0%,
        #e8c97a 15%,
        #d4aa50 30%,
        #f0d880 45%,
        #c9a84c 55%,
        #e8c97a 68%,
        #f8eed8 80%,
        #d4aa50 100%
      );
    overflow: hidden;
    box-shadow:
      0 0 0 1px rgba(255,230,150,0.4),
      0 8px 32px rgba(0,0,0,0.6),
      0 24px 64px rgba(0,0,0,0.5),
      inset 0 1px 0 rgba(255,255,255,0.5),
      inset 0 -1px 0 rgba(180,130,40,0.4);
  }

  /* Inner glow */
  .card-base::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 50% 50%, rgba(255,245,200,0.25) 0%, transparent 70%);
    border-radius: 16px;
    z-index: 1;
  }

  /* Specular highlight — moves via JS */
  .specular {
    position: absolute;
    width: 200%;
    height: 200%;
    top: -50%;
    left: -50%;
    background: radial-gradient(ellipse at 50% 50%,
      rgba(255,255,255,0.75) 0%,
      rgba(255,255,255,0.25) 20%,
      transparent 50%
    );
    pointer-events: none;
    z-index: 20;
    transition: transform 0.08s ease-out;
    mix-blend-mode: screen;
    border-radius: 50%;
  }

  /* ===== MAHJONG WATERMARK ===== */
  .watermark {
    position: absolute;
    inset: 0;
    border-radius: 16px;
    overflow: hidden;
    z-index: 2;
    opacity: 0;
    transition: opacity 0.4s ease;
  }
  .card:hover .watermark { opacity: 1; }

  .watermark svg {
    width: 100%;
    height: 100%;
    opacity: 0.12;
  }

  /* ===== STREAMLINES (Racing) ===== */
  .streamlines {
    position: absolute;
    inset: 0;
    border-radius: 16px;
    overflow: hidden;
    z-index: 3;
  }

  .streamlines svg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
  }

  .stream-line {
    stroke-dasharray: 600;
    stroke-dashoffset: 600;
    animation: streamDraw 2s 1.4s cubic-bezier(0.4, 0, 0.2, 1) forwards;
  }
  .stream-line:nth-child(2) { animation-delay: 1.55s; }
  .stream-line:nth-child(3) { animation-delay: 1.7s; }

  @keyframes streamDraw {
    to { stroke-dashoffset: 0; }
  }

  /* ===== STAR DOTS (Lottery) ===== */
  .stars {
    position: absolute;
    bottom: 28px;
    left: 24px;
    z-index: 4;
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    width: 60px;
  }

  .star-dot {
    color: rgba(120,80,10,0.45);
    font-size: 6px;
    animation: starFadeIn 0.4s ease forwards;
    opacity: 0;
  }

  @keyframes starFadeIn {
    to { opacity: 1; }
  }

  /* ===== LOGO ===== */
  .logo-zone {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -54%);
    z-index: 10;
    text-align: center;
  }

  .logo-emboss {
    font-family: 'Cormorant Garamond', serif;
    font-size: 52px;
    font-weight: 600;
    letter-spacing: 0.04em;
    color: transparent;
    background: linear-gradient(165deg,
      rgba(255,255,255,0.9) 0%,
      rgba(200,160,50,0.9) 30%,
      rgba(255,240,180,0.95) 50%,
      rgba(160,110,20,0.8) 70%,
      rgba(220,180,80,0.9) 100%
    );
    -webkit-background-clip: text;
    background-clip: text;
    filter: drop-shadow(0 2px 4px rgba(100,60,0,0.5)) drop-shadow(0 -1px 0 rgba(255,255,255,0.6));
    position: relative;
    line-height: 1;
  }

  .logo-emboss::after {
    content: attr(data-text);
    position: absolute;
    inset: 0;
    background: linear-gradient(165deg,
      rgba(255,255,255,0.3) 0%,
      transparent 40%,
      rgba(255,255,255,0.15) 100%
    );
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }

  .tagline {
    font-family: 'Montserrat', sans-serif;
    font-size: 7px;
    font-weight: 200;
    letter-spacing: 0.38em;
    color: rgba(100,65,10,0.7);
    text-transform: uppercase;
    margin-top: 6px;
  }

  /* ===== SERIAL NUMBER + HOLOGRAM ===== */
  .serial-zone {
    position: absolute;
    bottom: 26px;
    right: 24px;
    z-index: 15;
    text-align: right;
    animation: serialReveal 0.6s 1.8s ease forwards;
    opacity: 0;
  }

  @keyframes serialReveal {
    to { opacity: 1; }
  }

  .serial-label {
    font-size: 6px;
    font-weight: 300;
    letter-spacing: 0.25em;
    color: rgba(100,65,10,0.55);
    text-transform: uppercase;
    margin-bottom: 3px;
  }

  .serial-number {
    font-size: 11px;
    font-weight: 300;
    letter-spacing: 0.12em;
    background: linear-gradient(90deg,
      #b8860b, #daa520, #ffd700, #e6ac00,
      #ff6ec7, #00d4ff, #7fff00, #ff6ec7, #daa520
    );
    background-size: 300% 100%;
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    animation: hologramShift 3s 2s linear infinite;
  }

  @keyframes hologramShift {
    0%   { background-position: 0% 50%; }
    50%  { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  /* ===== OWNER NAME ===== */
  .owner-zone {
    position: absolute;
    top: 26px;
    left: 24px;
    z-index: 10;
    animation: serialReveal 0.5s 1.6s ease forwards;
    opacity: 0;
  }

  .owner-label {
    font-size: 6px;
    font-weight: 200;
    letter-spacing: 0.3em;
    color: rgba(100,65,10,0.5);
    text-transform: uppercase;
    margin-bottom: 3px;
  }

  .owner-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 15px;
    font-weight: 300;
    letter-spacing: 0.1em;
    color: rgba(90,55,5,0.75);
  }

  /* ===== CARD EDGE GLOW ===== */
  .edge-glow {
    position: absolute;
    inset: -1px;
    border-radius: 17px;
    background: transparent;
    box-shadow:
      0 0 0 1px rgba(255,220,100,0.3),
      0 0 20px rgba(200,160,50,0.2);
    z-index: 25;
    pointer-events: none;
  }

  /* ===== PARTICLE CANVAS ===== */
  canvas#particles {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 100;
  }

  /* ===== AMBIENT BG ===== */
  .bg-glow {
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 50% at 50% 50%, rgba(200,160,50,0.06) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }
</style>
</head>
<body>
<div class="bg-glow"></div>
<canvas id="particles"></canvas>

<div class="scene" id="scene">
  <div class="card" id="card">
    <div class="card-base">
      <!-- Specular -->
      <div class="specular" id="specular"></div>

      <!-- Watermark: Mahjong tiles -->
      <div class="watermark">
        <svg viewBox="0 0 380 240" xmlns="http://www.w3.org/2000/svg">
          <!-- Manzu (bamboo characters) simplified tile grid -->
          <g fill="none" stroke="#7a5a00" stroke-width="0.8" opacity="0.9">
            <!-- Row of tile outlines -->
            <rect x="20" y="20" width="28" height="38" rx="3"/>
            <rect x="54" y="20" width="28" height="38" rx="3"/>
            <rect x="88" y="20" width="28" height="38" rx="3"/>
            <rect x="122" y="20" width="28" height="38" rx="3"/>
            <rect x="156" y="20" width="28" height="38" rx="3"/>
            <rect x="190" y="20" width="28" height="38" rx="3"/>
            <rect x="224" y="20" width="28" height="38" rx="3"/>
            <rect x="258" y="20" width="28" height="38" rx="3"/>
            <rect x="292" y="20" width="28" height="38" rx="3"/>
            <rect x="326" y="20" width="28" height="38" rx="3"/>

            <!-- Bamboo circles (Pinzu style) -->
            <circle cx="34" cy="39" r="6"/>
            <circle cx="68" cy="39" r="6"/>
            <circle cx="102" cy="39" r="6"/>

            <!-- Circles pattern mid row -->
            <circle cx="136" cy="31" r="4.5"/>
            <circle cx="136" cy="47" r="4.5"/>
            <circle cx="170" cy="31" r="4.5"/>
            <circle cx="170" cy="47" r="4.5"/>

            <!-- Souzu bamboo rods -->
            <line x1="202" y1="26" x2="202" y2="52"/>
            <line x1="207" y1="26" x2="207" y2="52"/>
            <line x1="212" y1="26" x2="212" y2="52"/>
            <line x1="236" y1="26" x2="236" y2="52"/>
            <line x1="241" y1="26" x2="241" y2="52"/>

            <!-- Row 2 -->
            <rect x="20" y="100" width="28" height="38" rx="3"/>
            <rect x="54" y="100" width="28" height="38" rx="3"/>
            <rect x="88" y="100" width="28" height="38" rx="3"/>
            <rect x="122" y="100" width="28" height="38" rx="3"/>
            <rect x="156" y="100" width="28" height="38" rx="3"/>
            <rect x="190" y="100" width="28" height="38" rx="3"/>
            <rect x="224" y="100" width="28" height="38" rx="3"/>
            <rect x="258" y="100" width="28" height="38" rx="3"/>
            <rect x="292" y="100" width="28" height="38" rx="3"/>
            <rect x="326" y="100" width="28" height="38" rx="3"/>

            <circle cx="34" cy="119" r="6"/>
            <circle cx="34" cy="108" r="3"/>
            <circle cx="34" cy="130" r="3"/>
            <circle cx="68" cy="119" r="6"/>
            <circle cx="102" cy="113" r="4.5"/>
            <circle cx="102" cy="125" r="4.5"/>

            <!-- Row 3 -->
            <rect x="20" y="180" width="28" height="38" rx="3"/>
            <rect x="54" y="180" width="28" height="38" rx="3"/>
            <rect x="88" y="180" width="28" height="38" rx="3"/>
            <rect x="122" y="180" width="28" height="38" rx="3"/>
            <rect x="156" y="180" width="28" height="38" rx="3"/>
            <rect x="190" y="180" width="28" height="38" rx="3"/>
            <rect x="224" y="180" width="28" height="38" rx="3"/>
            <rect x="258" y="180" width="28" height="38" rx="3"/>
            <rect x="292" y="180" width="28" height="38" rx="3"/>
            <rect x="326" y="180" width="28" height="38" rx="3"/>

            <circle cx="34" cy="199" r="5"/>
            <circle cx="68" cy="192" r="3.5"/>
            <circle cx="68" cy="206" r="3.5"/>
            <circle cx="102" cy="192" r="3.5"/>
            <circle cx="102" cy="199" r="3.5"/>
            <circle cx="102" cy="206" r="3.5"/>
          </g>
        </svg>
      </div>

      <!-- Streamlines -->
      <div class="streamlines">
        <svg viewBox="0 0 380 240" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
          <path class="stream-line"
            d="M 360 220 Q 280 180 200 140 Q 120 100 40 20"
            stroke="rgba(90,55,5,0.28)" stroke-width="1.2" fill="none"/>
          <path class="stream-line"
            d="M 370 230 Q 290 185 205 148 Q 115 108 30 28"
            stroke="rgba(140,100,20,0.18)" stroke-width="0.7" fill="none"/>
          <path class="stream-line"
            d="M 375 215 Q 295 175 215 138 Q 125 98 20 15"
            stroke="rgba(200,160,60,0.15)" stroke-width="0.5" fill="none"/>
        </svg>
      </div>

      <!-- Star lottery dots (rendered via JS below) -->
      <div class="stars" id="stars"></div>

      <!-- Logo -->
      <div class="logo-zone">
        <div class="logo-emboss" data-text="Q-Jong">Q-Jong</div>
        <div class="tagline">Official Owner's Card</div>
      </div>

      <!-- Owner -->
      <div class="owner-zone">
        <div class="owner-label">Owner</div>
        <div class="owner-name">Member No. 2026</div>
      </div>

      <!-- Serial -->
      <div class="serial-zone">
        <div class="serial-label">Serial</div>
        <div class="serial-number">No. 0001 / 2026</div>
      </div>

      <!-- Edge glow overlay -->
      <div class="edge-glow"></div>
    </div>
  </div>
</div>

<script>
// ===== GYRO / MOUSE TILT =====
const card = document.getElementById('card');
const scene = document.getElementById('scene');
const specular = document.getElementById('specular');

let targetRX = 8, targetRY = -8;
let currentRX = 8, currentRY = -8;
let animId;

function lerp(a, b, t) { return a + (b - a) * t; }

function animate() {
  currentRX = lerp(currentRX, targetRX, 0.14);
  currentRY = lerp(currentRY, targetRY, 0.14);
  card.style.transform = `rotateX(${currentRX}deg) rotateY(${currentRY}deg)`;

  const nx = (currentRY + 50) / 100;
  const ny = (currentRX + 40) / 80;
  specular.style.transform = `translate(${(nx - 0.5) * 120}%, ${(ny - 0.5) * 120}%)`;

  animId = requestAnimationFrame(animate);
}
animate();

document.addEventListener('mousemove', (e) => {
  const cx = window.innerWidth / 2;
  const cy = window.innerHeight / 2;
  const dx = (e.clientX - cx) / cx;
  const dy = (e.clientY - cy) / cy;
  targetRY = dx * 20;
  targetRX = -dy * 16 + 4;
});

document.addEventListener('mouseleave', () => {
  targetRX = 8; targetRY = -8;
});

// ===== GYROSCOPE (iOS Safari + Android Chrome) =====
let gyroActive = false;

function startGyro() {
  window.addEventListener('deviceorientation', (e) => {
    if (e.gamma === null && e.beta === null) return;
    gyroActive = true;
    // gamma: left/right tilt (-90 to 90) → rotateY
    // beta:  front/back tilt (0~180 natural hold) → rotateX
    const gamma = Math.max(-50, Math.min(50, e.gamma || 0));
    const beta  = Math.max(0, Math.min(90, e.beta  || 45));
    targetRY = gamma * 1.0;
    targetRX = -(beta - 45) * 0.8;
  }, true);
}

// iOS 13+ requires explicit permission via user gesture
if (typeof DeviceOrientationEvent !== 'undefined' &&
    typeof DeviceOrientationEvent.requestPermission === 'function') {
  // Show tap-to-enable button
  const btn = document.createElement('button');
  btn.id = 'gyro-btn';
  btn.textContent = '傾けて光を動かす ▶';
  Object.assign(btn.style, {
    position: 'fixed', bottom: '32px', left: '50%',
    transform: 'translateX(-50%)',
    background: 'rgba(255,210,80,0.12)',
    border: '1px solid rgba(255,210,80,0.35)',
    color: 'rgba(255,220,120,0.85)',
    fontFamily: "'Montserrat', sans-serif",
    fontSize: '11px', fontWeight: '200',
    letterSpacing: '0.2em',
    padding: '10px 22px',
    borderRadius: '30px',
    cursor: 'pointer',
    backdropFilter: 'blur(8px)',
    zIndex: '200',
    transition: 'opacity 0.4s ease',
  });
  document.body.appendChild(btn);

  btn.addEventListener('click', async () => {
    try {
      const permission = await DeviceOrientationEvent.requestPermission();
      if (permission === 'granted') {
        startGyro();
        btn.style.opacity = '0';
        setTimeout(() => btn.remove(), 500);
      }
    } catch (err) {
      console.warn('Gyro permission denied:', err);
      btn.textContent = '許可されませんでした';
    }
  });
} else if (window.DeviceOrientationEvent) {
  // Android Chrome — no permission needed
  startGyro();
}

// ===== STAR DOTS =====
const starsEl = document.getElementById('stars');
const starPositions = [
  [0,0],[14,0],[28,0],[7,8],[21,8],[0,16],[14,16],[28,16],
  [7,24],[21,24],[0,32],[14,32]
];
starPositions.forEach(([x,y], i) => {
  const el = document.createElement('span');
  el.textContent = '★';
  el.className = 'star-dot';
  el.style.position = 'absolute';
  el.style.left = x + 'px';
  el.style.top = y + 'px';
  el.style.animationDelay = (1.6 + i * 0.07) + 's';
  starsEl.appendChild(el);
});

// ===== PARTICLE BURST on load =====
const canvas = document.getElementById('particles');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const particles = [];

function spawnParticles() {
  const cx = window.innerWidth / 2;
  const cy = window.innerHeight / 2;
  // Card approximate edge points
  const edgePoints = [];
  const cardW = 380, cardH = 240;
  for (let t = 0; t < 1; t += 0.04) {
    edgePoints.push([cx - cardW/2 + cardW * t, cy - cardH/2]);
    edgePoints.push([cx - cardW/2 + cardW * t, cy + cardH/2]);
    edgePoints.push([cx - cardW/2, cy - cardH/2 + cardH * t]);
    edgePoints.push([cx + cardW/2, cy - cardH/2 + cardH * t]);
  }
  edgePoints.forEach(([x, y]) => {
    if (Math.random() > 0.5) return;
    const angle = Math.random() * Math.PI * 2;
    const speed = 1 + Math.random() * 2.5;
    const gold = Math.random();
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 1.5,
      life: 1,
      decay: 0.02 + Math.random() * 0.025,
      size: 1 + Math.random() * 2.5,
      color: gold > 0.5 ? `rgba(255,210,80,` : `rgba(255,240,180,`
    });
  });
}

function updateParticles() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.04;
    p.life -= p.decay;
    if (p.life <= 0) { particles.splice(i, 1); continue; }
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
    ctx.fillStyle = p.color + p.life + ')';
    ctx.fill();
  }
  requestAnimationFrame(updateParticles);
}

setTimeout(() => {
  spawnParticles();
  setTimeout(spawnParticles, 200);
  setTimeout(spawnParticles, 400);
}, 900);

updateParticles();

window.addEventListener('resize', () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});
</script>
</body>
</html>
