<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q-Jong</title>
    <link rel="apple-touch-icon" href="assets/icon.png" sizes="1024x1024">
    <link rel="icon" type="image/png" href="assets/icon.png">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <header>
        <h1> Q-Jong </h1>
    </header>

    <main>
        <div class="attendance-bar">
            <div id="weather-bar"></div>
            <div id="attendance-bar"></div>
        </div>

        <div class="ranking-scroll-wrapper">
            <div class="ranking-panel">
                <h2> 現在のスコアランキング </h2>
                <div id="scores-container">
                    <p>データを読み込み中...</p>
                </div>
                <p class="update-info" id="last-update"></p>
                <button id="refresh-button">🔄 ランキング更新</button>
            </div>
            <div class="ranking-panel">
                <h2>💼 就活ランキング</h2>
                <div id="home-career-container">
                    <p>データを読み込み中...</p>
                </div>
            </div>
        </div>

        <div class="info-box mt-20">
            <h3 class="icon-title">📷 学生食堂情報</h3>
            <div class="cafeteria-layout">
                <div class="cafeteria-panel">
                    <p class="cafeteria-label">今週のメニュー</p>
                    <img alt="津田沼 学生食堂メニュー" id="tsudanuma-menu"
                         style="width:100%; border-radius:2px; display:block;">
                </div>
            </div>
        </div>

        <div class="info-box mt-20">
            <h3 class="icon-title"> 宝くじ開催中</h3>
            <div id="lottery-list-container">
                <p>宝くじデータを読み込み中...</p>
            </div>
        </div>
        
        <div class="info-box mt-20">
            <h3 class="icon-title">⚽ スポーツくじ</h3>
            <div id="sports-bets-container">
                <p>くじデータを読み込み中...</p>
            </div>
        </div>

        <div class="info-box mt-20 territory-section">
            <h3 class="territory-title">東京19区 陣取り合戦</h3>
            <div id="territory-battle-container">
                <p>戦況を読み込み中...</p>
            </div>
        </div>


    </main>

    <footer>
        <nav class="footer-nav">
            <a href="index.html"  class="input-link">ランキング</a>
            <a href="mypage.html" class="input-link">マイページ</a>
            <a href="career.html" class="input-link">就活</a>
            <a href="master.html" class="input-link">マスター</a>
        </nav>
    </footer>

    <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-storage-compat.js"></script>
    <script src="assets/js/firebase-config.js"></script>
    <script src="assets/js/common.js"></script>
    <script src="assets/js/main.js"></script>
</body>
</html>
