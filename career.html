<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>就活</title>
    <link rel="icon" type="image/png" href="assets/icon.png">
    <script>
        if (localStorage.getItem('authUsername') && localStorage.getItem('authPassword')) {
            document.documentElement.classList.add('auth-pending');
        }
    </script>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <header>
        <h1>就活</h1>
    </header>

    <main id="main-content">
        <section id="auth-section">
            <h2>認証</h2>
            <form id="auth-form">
                <div class="form-group">
                    <label for="username">ユーザー名:</label>
                    <input type="text" id="username" required>
                </div>
                <div class="form-group">
                    <label for="password">パスワード:</label>
                    <input type="password" id="password" required>
                </div>
                <button type="submit">ログイン</button>
            </form>
            <p id="auth-message" class="hidden"></p>
        </section>

        <section id="career-content" class="hidden">
            <div class="tool-box flex-between">
                <div>
                    <h3>ようこそ、<span id="authenticated-user-name"></span>様！</h3>
                    <p>現在のポイント残高: <strong id="current-score" class="text-large" style="color: var(--color-accent);"></strong> P</p>
                </div>
                <button type="button" id="logout-button" class="action-button secondary-button mt-10">ログアウト</button>
            </div>

            <div class="tool-box" id="career-management-section">
                <div class="career-management-header">
                    <div>
                        <h3>就活管理ツール</h3>
                        <p class="instruction">企業ごとの選考状況、給与、マイページ、詳細情報を一覧で管理します。</p>
                    </div>
                    <button type="button" id="career-add-company-button" class="action-button w-auto">企業を追加</button>
                </div>
                <div class="career-table-controls">
                    <label for="career-sort-select">並び替え:</label>
                    <select id="career-sort-select">
                        <option value="priority">志望度順</option>
                        <option value="status">選考状況順</option>
                        <option value="name">企業名順</option>
                        <option value="tasks">未完了タスク数順</option>
                    </select>
                </div>
                <p id="career-management-message" class="hidden"></p>
                <div id="career-company-list"><p>ロード中...</p></div>
            </div>

            <div class="tool-box" id="career-task-table-section">
                <h3>タスク一覧</h3>
                <p class="instruction">全企業のタスクをまとめて確認できます。</p>
                <div id="career-all-task-table"><p>ロード中...</p></div>
            </div>

            <div id="career-company-modal" class="career-modal hidden" role="dialog" aria-modal="true" aria-labelledby="career-modal-title">
                <div class="career-modal-backdrop" data-career-action="close-modal"></div>
                <div class="career-modal-panel">
                    <div class="career-modal-header">
                        <h3 id="career-modal-title">企業詳細</h3>
                        <button type="button" class="career-modal-close" data-career-action="close-modal" aria-label="閉じる">×</button>
                    </div>
                    <form id="career-company-form" class="career-company-form">
                        <input type="hidden" id="career-company-id">
                        <div class="career-form-grid">
                            <div class="form-group"><label for="career-company-name">企業名:</label><input type="text" id="career-company-name" required></div>
                            <div class="form-group"><label for="career-company-priority">志望順位:</label><select id="career-company-priority"><option>高</option><option selected>中</option><option>低</option></select></div>
                            <div class="form-group"><label for="career-company-status">選考状況:</label><select id="career-company-status"><option>未応募</option><option>ES準備中</option><option>ES提出済み</option><option>Webテスト</option><option>一次面接</option><option>二次面接</option><option>最終面接</option><option>内定</option><option>不合格</option><option>辞退</option></select></div>
                            <div class="form-group"><label for="career-company-salary">給与:</label><input type="text" id="career-company-salary"></div>
                            <div class="form-group"><label for="career-company-url">企業マイページリンク:</label><input type="url" id="career-company-url"></div>
                            <div class="form-group"><label for="career-company-login-id">マイページログインID:</label><input type="text" id="career-company-login-id"></div>
                            <div class="form-group"><label for="career-company-password">パスワード:</label><input type="text" id="career-company-password"></div>
                        </div>
                        <div class="form-group"><label for="career-company-es">ES:</label><textarea id="career-company-es" rows="5" placeholder="ESの設問や回答メモ"></textarea></div>
                        <div class="career-form-actions">
                            <button type="submit" class="action-button w-auto">保存</button>
                            <button type="button" id="career-company-delete-button" class="action-button secondary-button danger-button w-auto hidden">企業を削除</button>
                        </div>
                    </form>
                    <section class="career-task-editor">
                        <h4>タスク</h4>
                        <div id="career-company-task-list"></div>
                    </section>
                    <form id="career-task-form" class="career-task-form">
                        <input type="hidden" id="career-task-company-id">
                        <div class="career-task-grid">
                            <div class="form-group"><label for="career-task-title">タスク名:</label><input type="text" id="career-task-title" required></div>
                            <div class="form-group"><label for="career-task-type">種別:</label><select id="career-task-type"><option>ES</option><option>SPI</option><option>写真</option><option>面接予約</option><option>その他</option></select></div>
                            <div class="form-group"><label for="career-task-deadline">締切日:</label><input type="date" id="career-task-deadline"></div>
                            <label class="career-task-check"><input type="checkbox" id="career-task-done"> 完了</label>
                        </div>
                        <div class="form-group"><label for="career-task-note">メモ:</label><textarea id="career-task-note" rows="2"></textarea></div>
                        <button type="submit" class="action-button w-auto">タスクを追加</button>
                    </form>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <nav class="footer-nav">
            <a href="index.html"  class="input-link">ホーム</a>
            <a href="mypage.html" class="input-link">マイページ</a>
            <a href="career.html" class="input-link">就活</a>
            <a href="master.html" class="input-link">マスター</a>
        </nav>
    </footer>

    <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-storage-compat.js"></script>
    <script src="assets/js/firebase-config.js"></script>
    <script src="assets/js/common.js"></script>
    <script src="assets/js/career.js"></script>
</body>
</html>
