<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#4f2d18">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Q-Jong">
    <title>Q-Jong</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="assets/icon.png" sizes="1024x1024">
    <link rel="icon" type="image/png" href="assets/icon.png">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <header>
        <h1> Q-Jong </h1>
    </header>

    <main>
        <div class="attendance-bar">
            <button type="button" id="refresh-button">更新</button>
            <div id="attendance-bar"></div>
        </div>

        <div class="ranking-scroll-wrapper">
            <div class="ranking-panel">
                <h2> 現在のスコアランキング </h2>
                <div id="scores-container">
                    <div class="loading-placeholder" role="status" aria-label="ランキングを読み込み中">
                        <div class="skeleton skeleton-row"></div>
                        <div class="skeleton skeleton-row"></div>
                        <div class="skeleton skeleton-row"></div>
                    </div>
                </div>
                <p class="update-info" id="last-update"></p>
            </div>
        </div>

        <div class="home-campus-grid mt-20">
            <div class="info-box home-campus-box home-cafeteria-box">
                <h3 class="icon-title">📷 学生食堂情報</h3>
                <div class="cafeteria-layout">
                    <div class="cafeteria-panel">
                        <p class="cafeteria-label">今週のメニュー</p>
                        <img alt="津田沼 学生食堂メニュー" id="tsudanuma-menu"
                             loading="lazy" decoding="async"
                             style="width:100%; border-radius:2px; display:block;">
                    </div>
                </div>
            </div>

            <div class="info-box home-campus-box" id="home-manaba-section">
                <h3 class="icon-title">manaba 未提出課題</h3>
                <p id="home-manaba-message" class="hidden" aria-live="polite"></p>
                <div id="home-manaba-assignment-list">
                    <div class="loading-placeholder" role="status" aria-label="manaba課題を読み込み中">
                        <div class="skeleton skeleton-text"></div>
                        <div class="skeleton skeleton-row"></div>
                        <div class="skeleton skeleton-row"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="info-box mt-20 home-events-section">
            <h3 class="icon-title">開催中のイベント</h3>
            <div class="home-event-group">
                <h4>宝くじ</h4>
                <div id="lottery-list-container">
                    <div class="loading-placeholder" role="status" aria-label="宝くじデータを読み込み中">
                        <div class="skeleton skeleton-row"></div>
                    </div>
                </div>
            </div>
            <div class="home-event-group">
                <h4>スポーツくじ</h4>
                <div id="sports-bets-container">
                    <div class="loading-placeholder" role="status" aria-label="くじデータを読み込み中">
                        <div class="skeleton skeleton-row"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="info-box mt-20 territory-section">
            <h3 class="territory-title">東京19区 陣取り合戦</h3>
            <div id="territory-battle-container">
                <div class="loading-placeholder" role="status" aria-label="戦況を読み込み中">
                    <div class="skeleton skeleton-row"></div>
                    <div class="skeleton skeleton-row"></div>
                </div>
            </div>
        </div>


    </main>

    <footer>
        <nav class="footer-nav" aria-label="メインメニュー">
            <a href="index.html"  class="input-link" aria-current="page"><span class="nav-icon">⌂</span><span>ホーム</span></a>
            <a href="mypage.html" class="input-link"><span class="nav-icon">◉</span><span>マイページ</span></a>
        </nav>
        <a href="x7k9p2v4q8.html" class="footer-edge-hit" aria-label=" "></a>
    </footer>

    <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-storage-compat.js"></script>
    <script src="assets/js/firebase-config.js"></script>
    <script src="assets/js/common.js"></script>
    <script src="assets/js/main.js"></script>
</body>
</html>
