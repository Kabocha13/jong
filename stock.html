<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>株式取引所 - Q-Jong</title>
    <link rel="icon" type="image/png" href="assets/icon.png">
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        main::before { display: none; }
    </style>
</head>
<body>
    <header>
        <h1>📈 株式取引所</h1>
    </header>

    <main id="main-content">

        <!-- 認証セクション -->
        <section id="auth-section">
            <h2>認証</h2>
            <p class="instruction">ユーザー名とパスワードを入力してログインしてください。</p>
            <form id="auth-form">
                <div class="form-group">
                    <label for="username">ユーザー名:</label>
                    <input type="text" id="username" required>
                </div>
                <div class="form-group">
                    <label for="password">パスワード:</label>
                    <input type="password" id="password" required>
                </div>
                <button type="submit">ログイン</button>
            </form>
            <p id="auth-message" class="hidden"></p>
        </section>

        <!-- メインコンテンツ (ログイン後) -->
        <section id="stock-content" class="hidden">

            <!-- ユーザー情報バー -->
            <div class="tool-box flex-between" style="padding: 16px 24px;">
                <div>
                    <p style="margin:0; font-size:0.85em; color:#8090a8; font-family:var(--font-display); letter-spacing:2px; text-transform:uppercase;">残高</p>
                    <p style="margin:4px 0 0; font-size:1.5em; font-family:var(--font-display); font-weight:700; color:var(--color-indigo);">
                        <span id="current-score">--</span> <span style="font-size:0.6em; color:var(--color-gold);">P</span>
                    </p>
                </div>
                <div style="text-align:right;">
                    <p style="margin:0; font-size:0.82em; color:#8090a8; font-style:italic;">
                        <span id="authenticated-user-name"></span> 様
                    </p>
                    <button type="button" id="logout-button" class="action-button secondary-button mt-10" style="width:auto; padding:6px 16px; font-size:0.72em; margin-top:6px;">ログアウト</button>
                </div>
            </div>

            <!-- 次回更新カウントダウン -->
            <div style="text-align:center; margin: -10px 0 20px; font-size:0.82em; color:#8090a8; font-style:italic;">
                次回株価更新まで: <span id="next-update-countdown">--:--:--</span>
            </div>

            <!-- 株式一覧 -->
            <div id="stocks-container">
                <p>株価データを読み込み中...</p>
            </div>

            <!-- 保有株一覧 -->
            <div class="tool-box" id="holdings-box">
                <h3>💼 保有株一覧</h3>
                <div id="holdings-container">
                    <p class="info-text">保有株はありません。</p>
                </div>
            </div>

        </section>
    </main>

    <footer>
        <nav class="footer-nav">
            <a href="index.html"  class="input-link">ランキング</a>
            <a href="mypage.html" class="input-link">マイページ</a>
            <a href="stock.html"  class="input-link">株式</a>
            <a href="master.html" class="input-link">マスター</a>
        </nav>
    </footer>

    <script src="assets/js/common.js"></script>
    <script src="assets/js/stock.js"></script>
</body>
</html>
